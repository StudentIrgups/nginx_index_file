# .github/workflows/mirror.yml
name: Mirror to GitLab
on: [push]
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: |
          git remote add gitlab http://root:${{ secrets.GITLAB_TOKEN }}@${{ secrets.BASTION_IP }}/root/nginx_index_file.git
          git push gitlab --all