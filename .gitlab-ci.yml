stages:
  - build
  - deploy

variables:
  DOCKER_HUB_IMAGE: "$DOCKER_HUB_USERNAME/$CI_PROJECT_NAME"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""

services:
  - docker:24-dind

build:
  stage: build
  script:
    - docker build -t $DOCKER_HUB_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker login -u $DOCKER_HUB_USERNAME -p $DOCKER_HUB_TOKEN
    - docker push $DOCKER_HUB_IMAGE:$CI_COMMIT_SHORT_SHA

deploy:
  stage: deploy
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
    - echo "$KUBECONFIG" > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
  script:
    - kubectl set image deployment/$PROJECT_NAME $CONTAINER_NAME=$DOCKER_HUB_IMAGE:$CI_COMMIT_SHORT_SHA -n $KUBE_NAMESPACE
  only:
    - main